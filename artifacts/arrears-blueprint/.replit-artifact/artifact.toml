kind = "web"
previewPath = "/"
title = "Arrears & Budget Blueprint"
version = "1.0.0"
id = "artifacts/arrears-blueprint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20143

[services.development]
run = "pnpm --filter @workspace/arrears-blueprint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arrears-blueprint", "run", "build" ]
publicDir = "artifacts/arrears-blueprint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20143"
BASE_PATH = "/"
