          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExportPayload" }

  /import:
    post:
      operationId: importData
      tags: [health]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportBody" }
      responses:
        "200":
          description: Import result with counts per section
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: object
                    additionalProperties: { type: integer }

